<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — FoodBridge</title>
    <meta
      name="description"
      content="Reset your FoodBridge password to regain access to your account."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Design System -->
    
    <link rel="stylesheet" href="../styles/auth-fix.css" />
  </head>

  <body class="auth-page no-footer">
    <!-- Navigation -->
    <nav class="auth-navbar" aria-label="Site navigation">
      <div class="auth-navbar__inner">
        <a href="../pages/index.html" class="auth-navbar__brand">
          <div class="auth-navbar__logo" aria-hidden="true">
            <img src="../assets/images/logo.png" alt="FoodBridge Logo">
          </div>
          <span class="auth-navbar__title">FoodBridge</span>
        </a>
        <a href="login.html" class="auth-navbar__back">
          <i class="fas fa-arrow-left"></i>
          <span>Back to Login</span>
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="auth-container">
      <div class="auth-card">
        <!-- Header -->
        <div class="auth-card__header">
          <div class="auth-card__icon" aria-hidden="true">
            <i class="fas fa-key"></i>
          </div>
          <h1 class="auth-card__title">Forgot Password?</h1>
          <p class="auth-card__subtitle">
            Enter your email and we'll send you a reset link
          </p>
        </div>

        <!-- Alert Container -->
        <div id="auth-alert" role="alert" aria-live="polite"></div>

        <!-- Forgot Password Form -->
        <form id="forgotPasswordForm" novalidate>
          <!-- Email -->
          <div class="auth-form-group">
            <label for="forgot-email" class="auth-label">Email Address</label>
            <div class="auth-input-wrapper">
              <i
                class="fas fa-envelope auth-input-wrapper__icon"
                aria-hidden="true"
              ></i>
              <input
                type="email"
                id="forgot-email"
                name="email"
                class="auth-input"
                placeholder="you@example.com"
                required
                autocomplete="email"
                aria-describedby="forgot-email-error"
              />
            </div>
            <div id="forgot-email-error"></div>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="forgotSubmitBtn"
            class="auth-btn auth-btn--primary"
          >
            <i class="fas fa-paper-plane" aria-hidden="true"></i>
            <span>Send Reset Link</span>
          </button>
        </form>

        <!-- Back to Login -->
        <p class="auth-switch">
          Remember your password?
          <a href="login.html" class="auth-switch__link">Sign in</a>
        </p>
      </div>
    </main>

    <!-- Scripts -->
    <script src="../utils/config.js"></script>
    <script src="../utils/toast.js"></script>
    <script src="../utils/app.js"></script>
    <script src="../auth/validation.js"></script>
    <script>
      (function () {
        "use strict";

        document.addEventListener("DOMContentLoaded", function () {
          const form = document.getElementById("forgotPasswordForm");
          const alertContainer = document.getElementById("auth-alert");
          const submitBtn = document.getElementById("forgotSubmitBtn");
          const emailField = document.getElementById("forgot-email");

          if (!form || !emailField) {
            console.error("[ForgotPassword] Required elements not found.");
            return;
          }

          function showAlert(message, type) {
            if (!alertContainer) return;
            const iconMap = {
              error: "fa-exclamation-circle",
              success: "fa-check-circle",
              info: "fa-info-circle",
              warning: "fa-exclamation-triangle",
            };
            alertContainer.innerHTML =
              '<div class="auth-alert auth-alert--' +
              type +
              '">' +
              '<i class="fas ' +
              (iconMap[type] || iconMap.info) +
              '"></i>' +
              "<span>" +
              message +
              "</span>" +
              "</div>";
          }

          function clearAlert() {
            if (alertContainer) alertContainer.innerHTML = "";
          }

          emailField.addEventListener("input", function () {
            authValidation.clearFieldError(emailField);
          });

          function validateForm() {
            clearAlert();
            let valid = true;

            if (
              !authValidation.isRequired(emailField.value) ||
              !authValidation.isValidEmail(emailField.value)
            ) {
              authValidation.showFieldError(
                emailField,
                "Please enter a valid email address",
              );
              valid = false;
            }
            return valid;
          }

          form.addEventListener("submit", async function (e) {
            e.preventDefault();

            if (!validateForm()) return;

            const email = emailField.value.trim();
            submitBtn.disabled = true;
            submitBtn.innerHTML =
              '<span class="auth-spinner"></span> Sending...';

            try {
              const response = await apiService.post("/auth/forgot-password", {
                email,
              });

              if (response.success) {
                showAlert(
                  "If an account exists, a password reset link has been sent to your email.",
                  "success",
                );
                form.reset();
              } else {
                throw new Error(response.message || "Request failed");
              }
            } catch (error) {
              showAlert(
                error.message || "Failed to send reset link. Please try again.",
                "error",
              );
            } finally {
              submitBtn.disabled = false;
              submitBtn.innerHTML =
                '<i class="fas fa-paper-plane" aria-hidden="true"></i><span>Send Reset Link</span>';
            }
          });

          const urlParams = new URLSearchParams(window.location.search);
          const messageParam = urlParams.get("message");
          if (messageParam) {
            showAlert(decodeURIComponent(messageParam), "info");
            window.history.replaceState(
              {},
              document.title,
              window.location.pathname,
            );
          }
        });
      })();
    </script>
  </body>
</html>
