<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — FoodBridge</title>
    <meta
      name="description"
      content="Create a new password for your FoodBridge account."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Design System -->
    
    <link rel="stylesheet" href="../styles/auth-fix.css" />
  </head>

  <body class="auth-page no-footer">
    <!-- Navigation -->
    <nav class="auth-navbar" aria-label="Site navigation">
      <div class="auth-navbar__inner">
        <a href="../pages/index.html" class="auth-navbar__brand">
          <div class="auth-navbar__logo" aria-hidden="true">
            <img src="../assets/images/logo.png" alt="FoodBridge Logo">
          </div>
          <span class="auth-navbar__title">FoodBridge</span>
        </a>
        <a href="login.html" class="auth-navbar__back">
          <i class="fas fa-arrow-left"></i>
          <span>Back to Login</span>
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="auth-container">
      <div class="auth-card">
        <!-- Header -->
        <div class="auth-card__header">
          <div class="auth-card__icon" aria-hidden="true">
            <i class="fas fa-lock"></i>
          </div>
          <h1 class="auth-card__title">Reset Password</h1>
          <p class="auth-card__subtitle">
            Create a new password for your account
          </p>
        </div>

        <!-- Alert Container -->
        <div id="auth-alert" role="alert" aria-live="polite"></div>

        <!-- Reset Password Form -->
        <form id="resetPasswordForm" novalidate>
          <!-- New Password -->
          <div class="auth-form-group">
            <label for="new-password" class="auth-label">New Password</label>
            <div class="auth-input-wrapper">
              <i
                class="fas fa-lock auth-input-wrapper__icon"
                aria-hidden="true"
              ></i>
              <input
                type="password"
                id="new-password"
                name="password"
                class="auth-input"
                placeholder="Enter new password"
                required
                autocomplete="new-password"
                aria-describedby="new-password-error"
              />
              <button
                type="button"
                class="auth-password-toggle"
                id="toggleNewPassword"
                aria-label="Toggle password visibility"
              >
                <i class="fas fa-eye" id="toggleNewPasswordIcon"></i>
              </button>
            </div>
            <div id="new-password-error"></div>
          </div>

          <!-- Confirm Password -->
          <div class="auth-form-group">
            <label for="confirm-password" class="auth-label"
              >Confirm Password</label
            >
            <div class="auth-input-wrapper">
              <i
                class="fas fa-lock auth-input-wrapper__icon"
                aria-hidden="true"
              ></i>
              <input
                type="password"
                id="confirm-password"
                name="confirmPassword"
                class="auth-input"
                placeholder="Confirm new password"
                required
                autocomplete="new-password"
                aria-describedby="confirm-password-error"
              />
              <button
                type="button"
                class="auth-password-toggle"
                id="toggleConfirmPassword"
                aria-label="Toggle confirm password visibility"
              >
                <i class="fas fa-eye" id="toggleConfirmPasswordIcon"></i>
              </button>
            </div>
            <div id="confirm-password-error"></div>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="resetSubmitBtn"
            class="auth-btn auth-btn--primary"
          >
            <i class="fas fa-save" aria-hidden="true"></i>
            <span>Reset Password</span>
          </button>
        </form>

        <!-- Back to Login -->
        <p class="auth-switch">
          Remember your password?
          <a href="login.html" class="auth-switch__link">Sign in</a>
        </p>
      </div>
    </main>

    <!-- Scripts -->
    <script src="../utils/config.js"></script>
    <script src="../utils/toast.js"></script>
    <script src="../utils/app.js"></script>
    <script src="../auth/validation.js"></script>
    <script>
      (function () {
        "use strict";

        document.addEventListener("DOMContentLoaded", function () {
          const form = document.getElementById("resetPasswordForm");
          const alertContainer = document.getElementById("auth-alert");
          const submitBtn = document.getElementById("resetSubmitBtn");
          const newPasswordField = document.getElementById("new-password");
          const confirmPasswordField =
            document.getElementById("confirm-password");

          const urlParams = new URLSearchParams(window.location.search);
          const token = urlParams.get("token");

          if (!token) {
            if (alertContainer) {
              alertContainer.innerHTML =
                '<div class="auth-alert auth-alert--error"><i class="fas fa-exclamation-circle"></i><span>Invalid or missing reset token. Please request a new password reset.</span></div>';
            }
            submitBtn.disabled = true;
            return;
          }

          function showAlert(message, type) {
            if (!alertContainer) return;
            const iconMap = {
              error: "fa-exclamation-circle",
              success: "fa-check-circle",
              info: "fa-info-circle",
              warning: "fa-exclamation-triangle",
            };
            alertContainer.innerHTML =
              '<div class="auth-alert auth-alert--' +
              type +
              '">' +
              '<i class="fas ' +
              (iconMap[type] || iconMap.info) +
              '"></i>' +
              "<span>" +
              message +
              "</span>" +
              "</div>";
          }

          function clearAlert() {
            if (alertContainer) alertContainer.innerHTML = "";
          }

          function setupPasswordToggle(toggleBtn, toggleIcon, passwordField) {
            if (toggleBtn && toggleIcon && passwordField) {
              toggleBtn.addEventListener("click", function (e) {
                e.preventDefault();
                const isPassword = passwordField.type === "password";
                passwordField.type = isPassword ? "text" : "password";
                toggleIcon.className = isPassword
                  ? "fas fa-eye-slash"
                  : "fas fa-eye";
              });
            }
          }

          setupPasswordToggle(
            document.getElementById("toggleNewPassword"),
            document.getElementById("toggleNewPasswordIcon"),
            newPasswordField,
          );
          setupPasswordToggle(
            document.getElementById("toggleConfirmPassword"),
            document.getElementById("toggleConfirmPasswordIcon"),
            confirmPasswordField,
          );

          [newPasswordField, confirmPasswordField].forEach(function (field) {
            field.addEventListener("input", function () {
              authValidation.clearFieldError(field);
            });
          });

          function validateForm() {
            clearAlert();
            let valid = true;

            if (!authValidation.isRequired(newPasswordField.value)) {
              authValidation.showFieldError(
                newPasswordField,
                "Please enter a new password",
              );
              valid = false;
            } else if (newPasswordField.value.length < 6) {
              authValidation.showFieldError(
                newPasswordField,
                "Password must be at least 6 characters",
              );
              valid = false;
            }

            if (!authValidation.isRequired(confirmPasswordField.value)) {
              authValidation.showFieldError(
                confirmPasswordField,
                "Please confirm your password",
              );
              valid = false;
            } else if (
              !authValidation.doPasswordsMatch(
                newPasswordField.value,
                confirmPasswordField.value,
              )
            ) {
              authValidation.showFieldError(
                confirmPasswordField,
                "Passwords do not match",
              );
              valid = false;
            }

            return valid;
          }

          form.addEventListener("submit", async function (e) {
            e.preventDefault();

            if (!validateForm()) return;

            const password = newPasswordField.value;
            submitBtn.disabled = true;
            submitBtn.innerHTML =
              '<span class="auth-spinner"></span> Resetting...';

            try {
              const response = await apiService.post("/auth/reset-password", {
                token: token,
                password: password,
              });

              if (response.success) {
                showAlert(
                  "Password reset successful! Redirecting to login...",
                  "success",
                );
                setTimeout(function () {
                  window.location.href =
                    "login.html?message=Password%20reset%20successfully.%20Please%20log%20in.";
                }, 2000);
              } else {
                throw new Error(response.message || "Reset failed");
              }
            } catch (error) {
              showAlert(
                error.message ||
                  "Failed to reset password. The token may have expired.",
                "error",
              );
            } finally {
              submitBtn.disabled = false;
              submitBtn.innerHTML =
                '<i class="fas fa-save" aria-hidden="true"></i><span>Reset Password</span>';
            }
          });
        });
      })();
    </script>
  </body>
</html>
