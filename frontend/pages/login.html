<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — FoodBridge</title>
    <meta
      name="description"
      content="Log in to your FoodBridge account to donate food, volunteer, or manage your organization."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Design System -->
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="../styles/auth-fix.css" />
  </head>

  <body class="auth-page no-footer">
    <!-- Navigation -->
    <nav class="auth-navbar" aria-label="Site navigation">
      <div class="auth-navbar__inner">
        <a href="../pages/index.html" class="auth-navbar__brand">
          <div class="auth-navbar__logo" aria-hidden="true">
            <img src="../assets/images/logo.png" alt="FoodBridge Logo">
          </div>
          <span class="auth-navbar__title">FoodBridge</span>
        </a>
        <a href="../pages/index.html" class="auth-navbar__back">
          <i class="fas fa-arrow-left"></i>
          <span>Back to Home</span>
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="auth-container">
      <div class="auth-card">
        <!-- Header -->
        <div class="auth-card__header">
          <div class="auth-card__icon" aria-hidden="true">
            <i class="fas fa-sign-in-alt"></i>
          </div>
          <h1 class="auth-card__title">Welcome Back</h1>
          <p class="auth-card__subtitle">Sign in to continue your journey</p>
        </div>

        <!-- Alert Container -->
        <div id="auth-alert" role="alert" aria-live="polite"></div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>
          <!-- Email -->
          <div class="auth-form-group">
            <label for="login-email" class="auth-label">Email Address</label>
            <div class="auth-input-wrapper">
              <i
                class="fas fa-envelope auth-input-wrapper__icon"
                aria-hidden="true"
              ></i>
              <input
                type="email"
                id="login-email"
                name="email"
                class="auth-input"
                placeholder="you@example.com"
                required
                autocomplete="email"
                aria-describedby="login-email-error"
              />
            </div>
            <div id="login-email-error"></div>
          </div>

          <!-- Password -->
          <div class="auth-form-group">
            <label for="login-password" class="auth-label">Password</label>
            <div class="auth-input-wrapper">
              <i
                class="fas fa-lock auth-input-wrapper__icon"
                aria-hidden="true"
              ></i>
              <input
                type="password"
                id="login-password"
                name="password"
                class="auth-input"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
                aria-describedby="login-password-error"
              />
              <button
                type="button"
                id="togglePassword"
                class="auth-password-toggle"
                aria-label="Toggle password visibility"
                aria-pressed="false"
                aria-controls="login-password"
                tabindex="0"
              >
                <i class="fas fa-eye" id="togglePasswordIcon"></i>
              </button>
            </div>
            <div id="login-password-error"></div>
          </div>

          <!-- Remember & Forgot -->
          <div class="auth-options-row" style="justify-content: flex-end;">
            <a href="forgot-password.html" class="auth-forgot-link"
              >Forgot password?</a
            >
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="loginSubmitBtn"
            class="auth-btn auth-btn--primary"
            disabled
          >
            <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
            <span>Sign In</span>
          </button>
        </form>

        <!-- Removed social login for a more professional look -->

        <!-- Switch Link -->
        <p class="auth-switch">
          Don't have an account?
          <a href="../pages/signup.html" class="auth-switch__link"
            >Create account</a
          >
        </p>
      </div>
    </main>

    <!-- Scripts -->
    <script src="../utils/config.js"></script>
    <script src="../utils/toast.js"></script>
    <script src="../utils/app.js"></script>
    <script src="../auth/validation.js"></script>
    
    <script src="../auth/signin.js"></script>
  </body>
</html>
